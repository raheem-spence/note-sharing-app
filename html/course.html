<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style2.css">
    <script type="module" src="/js/pages/course.js" defer></script>
    <title>📖 NoteShare</title>
</head>
<body>
    <aside id="sidebar">
        <div class="logo">📖 NoteShare</div>

        <nav class="sidebar-nav">
            <p class="sidebar-label">My Courses</p>

            <ul id="course-list">
            </ul>
        </nav>

        <button class="join-course-btn"><span class="plus-sign">+</span>Join Course</button>

        <div class="sidebar-user">
            <div class="user-icon">
                <img src="https://w0.peakpx.com/wallpaper/935/887/HD-wallpaper-deku-portrait-hero-green-mha.jpg" alt="headshot of izuku midoriya">
            </div>
            <div class="user-info">
                <p class="username">Izuku Midoriya</p>
                <p class="user-email">deku@example.com</p>
            </div>
        </div>
    </aside>
    <main>
        <header class="course-header">
            <h2 id="course-title">Chemistry Notes</h2>
            <div class="search-bar-container">
                <search class="search-bar">
                    <span>🔍</span><input type="search" placeholder="Search notes...">
                </search>
            </div>
        </header>
        <div class="new-note-container"> 
            <h3>Create a new note</h3>
            <div class="title-container">
                <input type="text" name="" id="note-title-input" placeholder="Note title...">
            </div>
            <div class="textarea-container">
                <textarea name="" id="note-content-input" cols="30" rows="10" 
                placeholder="Start writing your note here..."></textarea>
                <button id="create-note-btn">Create Note</button>
            </div>
        </div>
        <h3 class="notes-container-heading">Notes</h3>
        <div id="notes-container" class="notes-container">
        </div>
    </main>
</body>
</html>
