<!--Login page-->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login | Margin</title>
        <link rel="stylesheet" href="../css/styles.css">
    </head>

    <body>
        <div class="login-signup" id="login">
            <form id="login-form">
                <h2>Sign in to <span>Margin</span></h2>
                <div class="input-container">
                    <input required id="email" type="email" autofocus autocomplete="off">
                    <span class="input-txt">EMAIL</span>
                </div>
                <div class="input-container">
                    <input required id="password" type="password" autofocus autocomplete="off">
                    <span class="input-txt">PASSWORD</span>
                </div>
                <div class="error-msg hidden" id="error-box">That email and password combination is incorrect.</div>
                <button id="login-btn" type="submit">Log In</button>
                
                <div class="login-links">
                    <a href="">Reset password</a>
                    <p>No account? <a href="signup.html">Create one</a></p>
                </div>
            </form>
        </div>
        <script src="../js/script.js"></script>
    </body>
</html>
