<!--Signup page-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="login-signup" id="signup">
        <h2>Sign Up</h2>
        <input required id="email" type="email" placeholder="Email" autofocus autocomplete="off">
        <input requried id="username" type="text" placeholder="Username" autocomplete="off">
        <input required id="password" type="password" placeholder="Password">
        <input required id="confirm-pw" type="password" placeholder="Confirm Password">
        <button id="create-accnt-btn" type="button">Sign Up</button>
        <p>Already have an account? <a href="index.html">Log in</a></p>
    </div>
</body>
</html>
